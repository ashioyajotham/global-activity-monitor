<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Activity Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--bg-primary:#080808;--bg-surface:#0f0f0f;--bg-card:#161616;--bg-elevated:#1c1c1c;--border-subtle:#222;--border-muted:#2a2a2a;--text-primary:#e8e8e8;--text-secondary:#999;--text-muted:#555;--green-active:#22c55e;--green-glow:rgba(34,197,94,.4);--green-dim:rgba(34,197,94,.15);--red-active:#ef4444;--red-glow:rgba(239,68,68,.4);--red-dim:rgba(239,68,68,.15);--amber-active:#f59e0b;--amber-glow:rgba(245,158,11,.4);--amber-dim:rgba(245,158,11,.15);--font-sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;--font-mono:'JetBrains Mono','Consolas',monospace}
        html,body{height:100%;overflow:hidden}
        body{font-family:var(--font-sans);background:var(--bg-primary);color:var(--text-primary);display:flex;flex-direction:column}
        body::before{content:'';position:fixed;inset:0;z-index:0;opacity:.03;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-size:256px}
        .header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border-subtle);background:var(--bg-surface);flex-shrink:0}
        .header-left{display:flex;align-items:center;gap:14px}
        .header-logo{width:8px;height:8px;border-radius:50%;background:var(--green-active);box-shadow:0 0 8px var(--green-glow);animation:pulse-green 2s ease-in-out infinite}
        .header-title{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text-secondary)}
        .header-right{display:flex;align-items:center;gap:20px}
        .header-stat{display:flex;align-items:center;gap:6px;font-size:10px;font-family:var(--font-mono);color:var(--text-muted)}
        .header-stat .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
        .header-stat .dot.red{background:var(--red-active);box-shadow:0 0 6px var(--red-glow)}
        .header-stat .dot.amber{background:var(--amber-active);box-shadow:0 0 6px var(--amber-glow)}
        .header-stat .dot.green{background:var(--green-active);box-shadow:0 0 6px var(--green-glow)}
        .header-stat .count{color:var(--text-secondary);font-weight:500}
        .data-source{display:flex;align-items:center;gap:5px;font-size:9px;font-family:var(--font-mono);color:var(--text-muted)}
        .data-source .source-dot{width:5px;height:5px;border-radius:50%;background:var(--green-active);animation:pulse-green 2s ease-in-out infinite}
        .data-source.offline .source-dot{background:var(--amber-active);animation:none}
        .notif-bell{position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:6px;border:1px solid var(--border-subtle);background:transparent;transition:all .2s;color:var(--text-muted)}
        .notif-bell:hover{background:var(--bg-card);color:var(--text-secondary)}
        .notif-bell svg{width:14px;height:14px;fill:currentColor}
        .notif-bell.has-alerts{animation:bell-ring .5s ease-in-out;color:var(--red-active)}
        @keyframes bell-ring{0%,100%{transform:rotate(0)}15%{transform:rotate(12deg)}30%{transform:rotate(-10deg)}45%{transform:rotate(8deg)}60%{transform:rotate(-6deg)}}
        .notif-badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;border-radius:8px;background:var(--red-active);color:#fff;font-size:9px;font-weight:700;font-family:var(--font-mono);display:none;align-items:center;justify-content:center;padding:0 4px;box-shadow:0 0 8px var(--red-glow)}
        .notif-badge.visible{display:flex}
        .notif-dropdown{position:absolute;top:calc(100% + 8px);right:0;width:320px;max-height:400px;overflow-y:auto;background:var(--bg-card);border:1px solid var(--border-muted);border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:100;display:none}
        .notif-dropdown.open{display:block}
        .notif-dropdown-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border-subtle);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-secondary)}
        .notif-clear{font-size:9px;color:var(--text-muted);cursor:pointer;letter-spacing:0;text-transform:none;font-weight:400}
        .notif-clear:hover{color:var(--text-secondary)}
        .notif-item{padding:10px 14px;border-bottom:1px solid var(--border-subtle);cursor:pointer;transition:background .15s}
        .notif-item:hover{background:var(--bg-elevated)}
        .notif-item-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
        .notif-item-name{font-size:12px;font-weight:600}
        .notif-item-time{font-size:9px;font-family:var(--font-mono);color:var(--text-muted);margin-left:auto}
        .notif-item-escalation{display:flex;align-items:center;gap:6px;font-size:10px;font-family:var(--font-mono)}
        .notif-status{padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600;text-transform:uppercase}
        .notif-status.stable{background:var(--green-dim);color:var(--green-active)}
        .notif-status.elevated{background:var(--amber-dim);color:var(--amber-active)}
        .notif-status.critical{background:var(--red-dim);color:var(--red-active)}
        .notif-arrow{color:var(--red-active);font-weight:700}
        .notif-empty{padding:24px;text-align:center;color:var(--text-muted);font-size:11px}
        .clock{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:1px}
        .main{position:relative;flex:1;display:flex;overflow:hidden;z-index:1}
        .map-container{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .map-container svg{width:100%;height:100%}
        .country-path{fill:#131313;stroke:#1e1e1e;stroke-width:.4;transition:fill .2s}
        .country-path:hover{fill:#1a1a1a}
        .country-path.active-country{fill:#1c1c1c}
        .graticule{fill:none;stroke:var(--border-subtle);stroke-width:.25;opacity:.4}
        .sphere-outline{fill:none;stroke:var(--border-subtle);stroke-width:.5;opacity:.3}
        .country-border{fill:none;stroke:#1e1e1e;stroke-width:.3}
        .activity-dot{cursor:pointer;transition:transform .2s}
        .activity-dot:hover .dot-inner{r:5}
        .hit-area{fill:transparent;stroke:none;cursor:pointer}
        .dot-outer{opacity:.2}
        .dot-inner{transition:r .15s}
        .dot-critical .dot-outer{animation:pulse-ring-red 2.5s ease-out infinite}
        .dot-elevated .dot-outer{animation:pulse-ring-amber 3s ease-out infinite}
        .connection-line{stroke-width:.5;opacity:.12;stroke-dasharray:4,4;animation:dash-flow 20s linear infinite}
        .tooltip{position:fixed;z-index:100;padding:8px 14px;background:rgba(22,22,22,.92);backdrop-filter:blur(12px);border:1px solid var(--border-muted);border-radius:6px;font-size:11px;font-weight:500;color:var(--text-primary);pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity .15s,transform .15s;white-space:nowrap}
        .tooltip.visible{opacity:1;transform:translateY(0)}
        .tooltip-status{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:6px;vertical-align:middle}
        .tooltip-score{margin-left:6px;font-family:var(--font-mono);font-size:9px;color:var(--text-muted)}
        .panel-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:50;opacity:0;pointer-events:none;transition:opacity .3s}
        .panel-overlay.active{opacity:1;pointer-events:all}
        .side-panel{position:absolute;top:0;right:0;width:380px;height:100%;z-index:60;background:rgba(14,14,14,.92);backdrop-filter:blur(24px);border-left:1px solid var(--border-subtle);transform:translateX(100%);transition:transform .35s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;overflow:hidden}
        .side-panel.open{transform:translateX(0)}
        .panel-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border-subtle);flex-shrink:0}
        .panel-header-title{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-muted)}
        .panel-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border-muted);border-radius:4px;background:transparent;color:var(--text-muted);cursor:pointer;font-size:14px;transition:all .15s}
        .panel-close:hover{border-color:var(--text-muted);color:var(--text-primary)}
        .panel-body{flex:1;padding:22px;overflow-y:auto}
        .panel-body::-webkit-scrollbar{width:3px}
        .panel-body::-webkit-scrollbar-thumb{background:var(--border-muted);border-radius:3px}
        .panel-activity-name{font-size:20px;font-weight:600;line-height:1.3;margin-bottom:14px}
        .panel-badges{display:flex;align-items:center;gap:8px;margin-bottom:22px;flex-wrap:wrap}
        .panel-status-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
        .panel-status-badge.critical{background:var(--red-dim);color:var(--red-active);border:1px solid rgba(239,68,68,.2)}
        .panel-status-badge.elevated{background:var(--amber-dim);color:var(--amber-active);border:1px solid rgba(245,158,11,.2)}
        .panel-status-badge.stable{background:var(--green-dim);color:var(--green-active);border:1px solid rgba(34,197,94,.2)}
        .panel-status-badge .badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
        .panel-score-badge{font-family:var(--font-mono);font-size:11px;font-weight:500;color:var(--text-muted);padding:4px 10px;border:1px solid var(--border-subtle);border-radius:4px}
        .confidence-badge{font-size:8px;font-family:var(--font-mono);font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px}
        .confidence-badge.high{background:var(--green-dim);color:var(--green-active)}
        .confidence-badge.normal{background:var(--bg-elevated);color:var(--text-muted)}
        .confidence-badge.low{background:rgba(245,158,11,.08);color:var(--text-muted);border:1px dashed var(--border-subtle)}
        .panel-section{margin-bottom:18px}
        .panel-section-label{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
        .panel-section-value{font-size:13px;line-height:1.65;color:var(--text-secondary)}
        .panel-parties{display:flex;flex-wrap:wrap;gap:6px}
        .party-tag{padding:4px 10px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:4px;font-size:11px;font-weight:500;color:var(--text-secondary)}
        .panel-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .panel-articles{display:flex;flex-direction:column;gap:8px}
        .panel-article{display:block;padding:10px 12px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:6px;text-decoration:none;transition:all .15s}
        .panel-article:hover{border-color:var(--border-muted);background:var(--bg-card)}
        .panel-article-title{font-size:12px;line-height:1.4;color:var(--text-secondary);margin-bottom:4px}
        .panel-article-meta{font-size:9px;font-family:var(--font-mono);color:var(--text-muted)}
        .panel-confidence-note{font-size:10px;font-family:var(--font-mono);color:var(--text-muted);padding:8px 10px;background:var(--bg-elevated);border:1px dashed var(--border-subtle);border-radius:4px;margin-bottom:18px;line-height:1.5}
        .news-river{width:300px;height:100%;border-left:1px solid var(--border-subtle);background:var(--bg-surface);display:flex;flex-direction:column;flex-shrink:0;z-index:5}
        .news-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border-subtle);flex-shrink:0}
        .news-header-left{display:flex;align-items:center;gap:8px}
        .news-breaking-dot{width:6px;height:6px;border-radius:50%;background:var(--red-active);box-shadow:0 0 6px var(--red-glow);animation:pulse-red 1.5s ease-in-out infinite}
        .news-header-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)}
        .news-count{font-family:var(--font-mono);font-size:9px;color:var(--text-muted)}
        .news-feed{flex:1;overflow-y:auto;padding:8px 0}
        .news-feed::-webkit-scrollbar{width:2px}
        .news-feed::-webkit-scrollbar-thumb{background:var(--border-muted)}
        .news-item{padding:12px 16px;border-bottom:1px solid rgba(34,34,34,.5);cursor:pointer;transition:background .15s;animation:news-slide-in .4s ease forwards;opacity:0}
        .news-item:hover{background:rgba(26,26,26,.6)}
        .news-item.breaking{border-left:2px solid var(--red-active)}
        .news-item-meta{display:flex;align-items:center;gap:6px;margin-bottom:5px}
        .news-item-source{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted)}
        .news-item-time{font-size:9px;font-family:var(--font-mono);color:var(--text-muted);opacity:.7}
        .news-item-dot{font-size:5px;color:var(--text-muted);opacity:.4}
        .news-item-title{font-size:12px;line-height:1.45;color:var(--text-secondary)}
        .news-item-regions{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
        .news-region-tag{font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:var(--bg-elevated);border:1px solid var(--border-subtle);color:var(--text-muted)}
        .news-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:11px;padding:20px}
        .activity-strip{position:absolute;bottom:14px;left:24px;z-index:20;display:flex;flex-direction:column;gap:3px;max-height:200px;overflow-y:auto;padding-right:8px}
        .activity-strip::-webkit-scrollbar{width:2px}
        .activity-strip::-webkit-scrollbar-thumb{background:var(--border-muted)}
        .strip-item{display:flex;align-items:center;gap:7px;padding:4px 10px;background:rgba(14,14,14,.75);backdrop-filter:blur(8px);border:1px solid var(--border-subtle);border-radius:4px;cursor:pointer;transition:all .15s;font-size:10px;color:var(--text-muted);white-space:nowrap}
        .strip-item:hover{border-color:var(--border-muted);color:var(--text-secondary);background:rgba(22,22,22,.88)}
        .strip-item .strip-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
        .strip-item .strip-dot.red{background:var(--red-active);box-shadow:0 0 4px var(--red-glow)}
        .strip-item .strip-dot.amber{background:var(--amber-active);box-shadow:0 0 4px var(--amber-glow)}
        .strip-item .strip-dot.green{background:var(--green-active);box-shadow:0 0 4px var(--green-glow)}
        .strip-item .strip-type{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);opacity:.6}
        .strip-item .strip-score{font-family:var(--font-mono);font-size:9px;margin-left:auto;opacity:.5}
        .strip-item.low-confidence{opacity:.55;border-style:dashed}
        .strip-item.low-confidence:hover{opacity:.85}
        .legend-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:8px 24px;border-top:1px solid var(--border-subtle);background:var(--bg-surface);flex-shrink:0}
        .legend-items{display:flex;align-items:center;gap:18px}
        .legend-item{display:flex;align-items:center;gap:6px;font-size:9px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted)}
        .legend-dot{width:6px;height:6px;border-radius:50%}
        .legend-dot.red{background:var(--red-active);box-shadow:0 0 5px var(--red-glow)}
        .legend-dot.amber{background:var(--amber-active);box-shadow:0 0 5px var(--amber-glow)}
        .legend-dot.green{background:var(--green-active);box-shadow:0 0 5px var(--green-glow)}
        .legend-attribution{font-size:9px;color:var(--text-muted)}
        .map-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-family:var(--font-mono);font-size:11px;letter-spacing:1px;z-index:2}
        .map-loading.hidden{display:none}
        @keyframes pulse-green{0%,100%{box-shadow:0 0 6px var(--green-glow)}50%{box-shadow:0 0 14px var(--green-glow),0 0 20px rgba(34,197,94,.15)}}
        @keyframes pulse-red{0%,100%{box-shadow:0 0 4px var(--red-glow);opacity:1}50%{box-shadow:0 0 10px var(--red-glow);opacity:.6}}
        @keyframes pulse-ring-red{0%{r:6;opacity:.3}100%{r:18;opacity:0}}
        @keyframes pulse-ring-amber{0%{r:5;opacity:.2}100%{r:14;opacity:0}}
        @keyframes dash-flow{to{stroke-dashoffset:-100}}
        @keyframes news-slide-in{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
        @media(max-width:900px){.news-river{display:none}.side-panel{width:100%}.activity-strip{display:none}}
        @media(max-width:600px){.header-stat{display:none}.data-source{display:none}}
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left"><div class="header-logo"></div><span class="header-title">Global Activity Monitor</span></div>
        <div class="header-right">
            <div class="header-stat"><span class="dot red"></span><span class="count" id="criticalCount">0</span><span>critical</span></div>
            <div class="header-stat"><span class="dot amber"></span><span class="count" id="elevatedCount">0</span><span>elevated</span></div>
            <div class="header-stat"><span class="dot green"></span><span class="count" id="stableCount">0</span><span>stable</span></div>
            <div class="data-source" id="dataSource"><span class="source-dot"></span><span id="sourceLabel">LOADING MAP</span></div>
            <div class="notif-bell" id="notifBell">
                <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
                <span class="notif-badge" id="notifBadge">0</span>
                <div class="notif-dropdown" id="notifDropdown">
                    <div class="notif-dropdown-header"><span>Escalations</span><span class="notif-clear" id="notifClear">Clear all</span></div>
                    <div id="notifList"><div class="notif-empty">No escalations yet</div></div>
                </div>
            </div>
            <div class="clock" id="clock">00:00:00 UTC</div>
        </div>
    </header>
    <main class="main">
        <div class="map-container" id="mapContainer">
            <div class="map-loading" id="mapLoading">Loading world map…</div>
            <svg id="mapSvg" viewBox="0 0 960 500" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                    <filter id="glow-amber" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                </defs>
                <g id="mapGroup"></g>
                <g id="connections"></g>
                <g id="dots"></g>
            </svg>
        </div>
        <div class="activity-strip" id="activityStrip"></div>
        <div class="panel-overlay" id="panelOverlay"></div>
        <div class="side-panel" id="sidePanel">
            <div class="panel-header"><span class="panel-header-title">Activity Detail</span><button class="panel-close" id="panelClose">✕</button></div>
            <div class="panel-body" id="panelBody"></div>
        </div>
        <aside class="news-river">
            <div class="news-header"><div class="news-header-left"><div class="news-breaking-dot"></div><span class="news-header-title">Breaking</span></div><span class="news-count" id="newsCount">0 items</span></div>
            <div class="news-feed" id="newsFeed"><div class="news-empty">Connecting to news feeds…</div></div>
        </aside>
    </main>
    <div class="tooltip" id="tooltip"></div>
    <footer class="legend-bar">
        <div class="legend-items">
            <div class="legend-item"><span class="legend-dot red"></span><span>Critical</span></div>
            <div class="legend-item"><span class="legend-dot amber"></span><span>Elevated</span></div>
            <div class="legend-item"><span class="legend-dot green"></span><span>Monitoring</span></div>
        </div>
        <span class="legend-attribution">Theme-Classified · GDELT GEO + DOC + RSS · Natural Earth · v4.1</span>
    </footer>

    <script>
    // ═══════════════════════════════════════════════════
    // ISO 3166-1 NUMERIC → COUNTRY NAME (for TopoJSON)
    // Standard international mapping, not custom data
    // ═══════════════════════════════════════════════════
    const ISO_NAMES={4:'Afghanistan',8:'Albania',12:'Algeria',24:'Angola',32:'Argentina',36:'Australia',40:'Austria',50:'Bangladesh',56:'Belgium',204:'Benin',64:'Bhutan',68:'Bolivia',70:'Bosnia & Herz.',72:'Botswana',76:'Brazil',96:'Brunei',100:'Bulgaria',854:'Burkina Faso',108:'Burundi',116:'Cambodia',120:'Cameroon',124:'Canada',140:'C. African Rep.',148:'Chad',152:'Chile',156:'China',170:'Colombia',178:'Congo',180:'DR Congo',188:'Costa Rica',384:"Côte d'Ivoire",191:'Croatia',192:'Cuba',196:'Cyprus',203:'Czechia',208:'Denmark',262:'Djibouti',214:'Dominican Rep.',218:'Ecuador',818:'Egypt',222:'El Salvador',226:'Eq. Guinea',232:'Eritrea',233:'Estonia',231:'Ethiopia',242:'Fiji',246:'Finland',250:'France',266:'Gabon',270:'Gambia',268:'Georgia',276:'Germany',288:'Ghana',300:'Greece',320:'Guatemala',324:'Guinea',624:'Guinea-Bissau',328:'Guyana',332:'Haiti',340:'Honduras',348:'Hungary',352:'Iceland',356:'India',360:'Indonesia',364:'Iran',368:'Iraq',372:'Ireland',376:'Israel',380:'Italy',388:'Jamaica',392:'Japan',400:'Jordan',398:'Kazakhstan',404:'Kenya',408:'North Korea',410:'South Korea',414:'Kuwait',417:'Kyrgyzstan',418:'Laos',428:'Latvia',422:'Lebanon',426:'Lesotho',430:'Liberia',434:'Libya',440:'Lithuania',442:'Luxembourg',450:'Madagascar',454:'Malawi',458:'Malaysia',466:'Mali',478:'Mauritania',484:'Mexico',496:'Mongolia',498:'Moldova',499:'Montenegro',504:'Morocco',508:'Mozambique',104:'Myanmar',516:'Namibia',524:'Nepal',528:'Netherlands',554:'New Zealand',558:'Nicaragua',562:'Niger',566:'Nigeria',578:'Norway',512:'Oman',586:'Pakistan',275:'Palestine',591:'Panama',598:'Papua New Guinea',600:'Paraguay',604:'Peru',608:'Philippines',616:'Poland',620:'Portugal',630:'Puerto Rico',634:'Qatar',642:'Romania',643:'Russia',646:'Rwanda',682:'Saudi Arabia',686:'Senegal',688:'Serbia',694:'Sierra Leone',702:'Singapore',703:'Slovakia',705:'Slovenia',706:'Somalia',710:'South Africa',728:'South Sudan',724:'Spain',144:'Sri Lanka',729:'Sudan',740:'Suriname',748:'Eswatini',752:'Sweden',756:'Switzerland',760:'Syria',158:'Taiwan',762:'Tajikistan',834:'Tanzania',764:'Thailand',626:'Timor-Leste',768:'Togo',780:'Trinidad & Tobago',788:'Tunisia',792:'Turkey',795:'Turkmenistan',800:'Uganda',804:'Ukraine',784:'UAE',826:'United Kingdom',840:'United States',858:'Uruguay',860:'Uzbekistan',548:'Vanuatu',862:'Venezuela',704:'Vietnam',887:'Yemen',894:'Zambia',716:'Zimbabwe'};

    // ═══════════════════════════════════════════════════
    // GLOBALS
    // ═══════════════════════════════════════════════════
    const API_BASE = window.location.origin;
    const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const WS_URL = wsProto + '//' + location.host + '/ws';

    let activities = [], newsItems = [], ws = null, wsConnected = false;
    let projection, pathGenerator, countryFeatures;

    const svg = d3.select('#mapSvg');
    const mapGroup = svg.select('#mapGroup');
    const connectionsG = document.getElementById('connections');
    const dotsG = document.getElementById('dots');
    const tooltip = document.getElementById('tooltip');
    const sidePanel = document.getElementById('sidePanel');
    const panelOverlay = document.getElementById('panelOverlay');
    const panelBody = document.getElementById('panelBody');
    const activityStrip = document.getElementById('activityStrip');
    const newsFeed = document.getElementById('newsFeed');

    const SC = {
        critical: { css:'var(--red-active)', glow:'url(#glow-red)', dot:'red' },
        elevated: { css:'var(--amber-active)', glow:'url(#glow-amber)', dot:'amber' },
        stable:   { css:'var(--green-active)', glow:'url(#glow-green)', dot:'green' },
    };

    // ═══════════════════════════════════════════════════
    // D3 MAP RENDERING (Natural Earth TopoJSON)
    // ═══════════════════════════════════════════════════

    async function drawMap() {
        // Natural Earth 1 projection — good balance of area/shape
        projection = d3.geoNaturalEarth1()
            .fitSize([960, 500], { type: 'Sphere' });

        pathGenerator = d3.geoPath().projection(projection);

        // Load world geometry from CDN (Natural Earth 110m, ~100KB)
        const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
        const countries = topojson.feature(world, world.objects.countries);
        const borders = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);
        countryFeatures = countries.features;

        // Assign names from ISO mapping
        countryFeatures.forEach(f => {
            f.properties.name = ISO_NAMES[f.id] || ISO_NAMES[+f.id] || 'Unknown';
        });

        // Sphere outline
        mapGroup.append('path')
            .datum({ type: 'Sphere' })
            .attr('d', pathGenerator)
            .attr('class', 'sphere-outline');

        // Graticule (grid)
        mapGroup.append('path')
            .datum(d3.geoGraticule10())
            .attr('d', pathGenerator)
            .attr('class', 'graticule');

        // Country fills
        mapGroup.selectAll('.country-path')
            .data(countryFeatures)
            .enter()
            .append('path')
            .attr('d', pathGenerator)
            .attr('class', 'country-path')
            .on('mouseenter', function(event, d) {
                d3.select(this).classed('active-country', true);
                showCountryTooltip(event, d.properties.name);
            })
            .on('mousemove', moveTooltip)
            .on('mouseleave', function() {
                d3.select(this).classed('active-country', false);
                hideTooltip();
            });

        // Country borders (drawn on top for crisp lines)
        mapGroup.append('path')
            .datum(borders)
            .attr('d', pathGenerator)
            .attr('class', 'country-border');

        document.getElementById('mapLoading').classList.add('hidden');
        console.log('[map] Rendered', countryFeatures.length, 'countries');
    }

    function latLngToXY(lat, lng) {
        if (!projection) return { x: -100, y: -100 };
        const coords = projection([lng, lat]);
        if (!coords) return { x: -100, y: -100 };
        return { x: coords[0], y: coords[1] };
    }

    function haversineKm(lat1,lng1,lat2,lng2){const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180,a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}

    // ═══════════════════════════════════════════════════
    // RENDER ACTIVITIES ON MAP
    // ═══════════════════════════════════════════════════

    function renderActivities(acts) {
        dotsG.innerHTML = '';
        connectionsG.innerHTML = '';
        activityStrip.innerHTML = '';

        // Connection lines
        for (let i = 0; i < acts.length; i++) {
            for (let j = i+1; j < acts.length; j++) {
                const a = acts[i], b = acts[j];
                if (haversineKm(a.lat,a.lng,b.lat,b.lng) < 2000 && (a.status !== 'stable' || b.status !== 'stable')) {
                    const pA = latLngToXY(a.lat,a.lng), pB = latLngToXY(b.lat,b.lng);
                    if (pA.x < 0 || pB.x < 0) continue;
                    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
                    line.setAttribute('x1',pA.x); line.setAttribute('y1',pA.y);
                    line.setAttribute('x2',pB.x); line.setAttribute('y2',pB.y);
                    line.setAttribute('class','connection-line');
                    line.setAttribute('stroke', SC[a.status]?.css || 'var(--red-active)');
                    connectionsG.appendChild(line);
                }
            }
        }

        // Dots
        acts.forEach((act, idx) => {
            const {x, y} = latLngToXY(act.lat, act.lng);
            if (x < 0) return; // off-projection
            const sc = SC[act.status] || SC.stable;
            const isCrit = act.status === 'critical', isElev = act.status === 'elevated';

            const g = document.createElementNS('http://www.w3.org/2000/svg','g');
            g.setAttribute('class', 'activity-dot dot-' + act.status);
            g.setAttribute('data-id', act.id);

            if (isCrit || isElev) {
                const outer = document.createElementNS('http://www.w3.org/2000/svg','circle');
                outer.setAttribute('cx',x); outer.setAttribute('cy',y);
                outer.setAttribute('r', isCrit ? '6' : '5');
                outer.setAttribute('fill','none'); outer.setAttribute('stroke',sc.css);
                outer.setAttribute('stroke-width','1'); outer.setAttribute('class','dot-outer');
                outer.style.animationDelay = idx * 0.3 + 's';
                g.appendChild(outer);
            }

            const dotSize = act.confidence === 'low' ? (isCrit ? '2.5' : isElev ? '2' : '1.5') : (isCrit ? '4' : isElev ? '3' : '2.5');
            const inner = document.createElementNS('http://www.w3.org/2000/svg','circle');
            inner.setAttribute('cx',x); inner.setAttribute('cy',y); inner.setAttribute('r',dotSize);
            inner.setAttribute('fill',sc.css); inner.setAttribute('class','dot-inner');
            inner.setAttribute('filter',sc.glow);
            if (act.confidence === 'low') inner.style.opacity = '0.5';
            g.appendChild(inner);

            const hit = document.createElementNS('http://www.w3.org/2000/svg','circle');
            hit.setAttribute('cx',x); hit.setAttribute('cy',y); hit.setAttribute('r','12');
            hit.setAttribute('class','hit-area');
            g.appendChild(hit);

            g.addEventListener('mouseenter', e => showActivityTooltip(e, act));
            g.addEventListener('mousemove', moveTooltip);
            g.addEventListener('mouseleave', hideTooltip);
            g.addEventListener('click', e => { e.stopPropagation(); openPanel(act); });
            dotsG.appendChild(g);
        });

        // Strip
        acts.forEach(act => {
            const sc = SC[act.status] || SC.stable;
            const el = document.createElement('div');
            el.className = 'strip-item' + (act.confidence === 'low' ? ' low-confidence' : '');
            el.innerHTML = '<span class="strip-dot '+sc.dot+'"></span><span>'+act.name+'</span><span class="strip-type">'+act.type+'</span><span class="strip-score">'+act.score+'</span>';
            el.addEventListener('click', () => openPanel(act));
            activityStrip.appendChild(el);
        });

        document.getElementById('criticalCount').textContent = acts.filter(a => a.status==='critical').length;
        document.getElementById('elevatedCount').textContent = acts.filter(a => a.status==='elevated').length;
        document.getElementById('stableCount').textContent = acts.filter(a => a.status==='stable').length;
    }

    // ═══════════════════════════════════════════════════
    // NEWS
    // ═══════════════════════════════════════════════════

    function renderNews(items, append = false) {
        if (!append) newsFeed.innerHTML = '';
        if (!items.length && !append) { newsFeed.innerHTML = '<div class="news-empty">No breaking news</div>'; return; }
        const frag = document.createDocumentFragment();
        items.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'news-item ' + (item.isBreaking ? 'breaking' : '');
            el.style.animationDelay = i * 0.05 + 's';
            el.innerHTML = '<div class="news-item-meta"><span class="news-item-source">'+item.source+'</span><span class="news-item-dot">●</span><span class="news-item-time">'+(item.timeAgo||'')+'</span></div><div class="news-item-title">'+item.title+'</div>';
            el.addEventListener('click', () => { if (item.link) window.open(item.link, '_blank'); });
            frag.appendChild(el);
        });
        if (append) newsFeed.insertBefore(frag, newsFeed.firstChild); else newsFeed.appendChild(frag);
        document.getElementById('newsCount').textContent = newsFeed.querySelectorAll('.news-item').length + ' items';
    }

    // ═══════════════════════════════════════════════════
    // TOOLTIPS
    // ═══════════════════════════════════════════════════

    function showCountryTooltip(event, name) {
        tooltip.innerHTML = '<span style="color:var(--text-muted)">' + name + '</span>';
        tooltip.classList.add('visible');
        moveTooltip(event);
    }
    function showActivityTooltip(event, act) {
        const sc = SC[act.status] || SC.stable;
        const conf = act.confidence === 'low' ? ' · satellite only' : '';
        tooltip.innerHTML = '<span class="tooltip-status" style="background:'+sc.css+'"></span>'+act.name+' · '+act.type+conf+'<span class="tooltip-score">'+act.score+'/10</span>';
        tooltip.classList.add('visible');
        moveTooltip(event);
    }
    function moveTooltip(e) { tooltip.style.left = (e.clientX+14)+'px'; tooltip.style.top = (e.clientY-10)+'px'; }
    function hideTooltip() { tooltip.classList.remove('visible'); }

    // ═══════════════════════════════════════════════════
    // PANEL
    // ═══════════════════════════════════════════════════

    function openPanel(act) {
        const sc = SC[act.status] || SC.stable;
        const arts = (act.topArticles||[]).map(a => '<a class="panel-article" href="'+a.url+'" target="_blank" rel="noopener"><div class="panel-article-title">'+a.title+'</div><div class="panel-article-meta">'+a.source+' · tone: '+(a.tone!=null?a.tone.toFixed(1):'n/a')+'</div></a>').join('');
        const artsHtml = arts ? '<div class="panel-section"><div class="panel-section-label">Related Coverage</div><div class="panel-articles">'+arts+'</div></div>' : '';
        const confBadge = act.confidence ? '<span class="confidence-badge '+act.confidence+'">'+act.confidence+'</span>' : '';
        const confNote = act.confidence === 'low' ? '<div class="panel-confidence-note">Low confidence — based primarily on satellite geo-events. Score capped until confirmed by news sources.</div>' : '';

        panelBody.innerHTML =
            '<h2 class="panel-activity-name">'+act.name+'</h2>'+
            '<div class="panel-badges"><div class="panel-status-badge '+act.status+'"><span class="badge-dot"></span>'+act.status.charAt(0).toUpperCase()+act.status.slice(1)+'</div><span class="panel-score-badge">'+act.score+' / 10</span>'+confBadge+'</div>'+
            '<div class="panel-meta-grid"><div class="panel-section"><div class="panel-section-label">Type</div><div class="panel-section-value">'+act.type+'</div></div><div class="panel-section"><div class="panel-section-label">Region</div><div class="panel-section-value">'+act.region+'</div></div></div>'+
            '<div class="panel-meta-grid"><div class="panel-section"><div class="panel-section-label">Articles (24h)</div><div class="panel-section-value" style="font-family:var(--font-mono);font-size:12px">'+(act.articleCount||0)+'</div></div><div class="panel-section"><div class="panel-section-label">Source Diversity</div><div class="panel-section-value" style="font-family:var(--font-mono);font-size:12px">'+(act.sourceDiversity||'—')+' unique sources</div></div></div>'+
            '<div class="panel-meta-grid"><div class="panel-section"><div class="panel-section-label">Coordinates</div><div class="panel-section-value" style="font-family:var(--font-mono);font-size:12px">'+act.lat.toFixed(1)+'°'+(act.lat>=0?'N':'S')+', '+Math.abs(act.lng).toFixed(1)+'°'+(act.lng>=0?'E':'W')+'</div></div><div class="panel-section"><div class="panel-section-label">Classification</div><div class="panel-section-value" style="font-size:11px;color:var(--text-muted)">GDELT theme-classified</div></div></div>'+
            confNote+
            '<div class="panel-section"><div class="panel-section-label">Situation</div><div class="panel-section-value">'+act.description+'</div></div>'+
            '<div class="panel-section"><div class="panel-section-label">Parties Involved</div><div class="panel-parties">'+act.parties.map(p=>'<span class="party-tag">'+p+'</span>').join('')+'</div></div>'+
            artsHtml;
        sidePanel.classList.add('open');
        panelOverlay.classList.add('active');
    }

    function closePanel() { sidePanel.classList.remove('open'); panelOverlay.classList.remove('active'); }
    document.getElementById('panelClose').addEventListener('click', closePanel);
    panelOverlay.addEventListener('click', closePanel);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

    // ═══════════════════════════════════════════════════
    // DATA FETCHING
    // ═══════════════════════════════════════════════════

    function updateClock() { const n = new Date(); document.getElementById('clock').textContent = String(n.getUTCHours()).padStart(2,'0')+':'+String(n.getUTCMinutes()).padStart(2,'0')+':'+String(n.getUTCSeconds()).padStart(2,'0')+' UTC'; }
    setInterval(updateClock, 1000); updateClock();

    async function fetchActivities() { try { const r = await fetch(API_BASE+'/api/activities'); const d = await r.json(); activities = d.activities||[]; renderActivities(activities); updateSource(d.source==='live'?'LIVE':'BASELINE'); } catch(e) { console.error(e); updateSource('OFFLINE'); } }
    async function fetchNews() { try { const r = await fetch(API_BASE+'/api/news'); const d = await r.json(); newsItems = d.news||[]; renderNews(newsItems); } catch(e) { console.error(e); } }
    function updateSource(label) { const el = document.getElementById('dataSource'); document.getElementById('sourceLabel').textContent = label; el.classList.toggle('offline', label !== 'LIVE'); }

    function connectWebSocket() {
        try {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => { wsConnected = true; console.log('[ws] Connected'); };
            ws.onmessage = e => { try { const m = JSON.parse(e.data);
                if (m.type==='init') { activities = m.activities||[]; renderActivities(activities); if (m.news?.length) { newsItems = m.news; renderNews(newsItems); } updateSource('LIVE'); }
                if (m.type==='activities_update') { activities = m.activities||[]; renderActivities(activities); updateSource('LIVE'); }
                if (m.type==='news_update') { const n = m.items||[]; if (n.length) { newsItems = [...n,...newsItems].slice(0,50); renderNews(n, true); } }
                if (m.type==='escalation') (m.escalations||[]).forEach(handleEscalation);
            } catch {} };
            ws.onclose = () => { wsConnected = false; updateSource('RECONNECTING'); setTimeout(connectWebSocket, 5000); };
            ws.onerror = () => ws.close();
        } catch { setTimeout(connectWebSocket, 5000); }
    }

    // ═══════════════════════════════════════════════════
    // NOTIFICATIONS
    // ═══════════════════════════════════════════════════

    let escalationHistory = [], unreadCount = 0;
    const notifBell = document.getElementById('notifBell');
    const notifBadge = document.getElementById('notifBadge');
    const notifDropdown = document.getElementById('notifDropdown');
    const notifList = document.getElementById('notifList');

    notifBell.addEventListener('click', e => { e.stopPropagation(); notifDropdown.classList.toggle('open'); if (notifDropdown.classList.contains('open')) { unreadCount = 0; notifBadge.classList.remove('visible'); notifBell.classList.remove('has-alerts'); } });
    document.addEventListener('click', e => { if (!notifBell.contains(e.target)) notifDropdown.classList.remove('open'); });
    document.getElementById('notifClear').addEventListener('click', e => { e.stopPropagation(); escalationHistory=[]; unreadCount=0; notifBadge.classList.remove('visible'); notifList.innerHTML='<div class="notif-empty">No escalations yet</div>'; });

    function handleEscalation(esc) {
        escalationHistory.unshift(esc);
        if (escalationHistory.length > 20) escalationHistory.pop();
        unreadCount++;
        notifBadge.textContent = unreadCount;
        notifBadge.classList.add('visible');
        notifBell.classList.remove('has-alerts');
        void notifBell.offsetWidth;
        notifBell.classList.add('has-alerts');
        // Alert sound
        try { const ctx = new (window.AudioContext||window.webkitAudioContext)(); const now = ctx.currentTime; [0,.15].forEach((d,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=i?660:440;g.gain.setValueAtTime(.15,now+d);g.gain.exponentialRampToValueAtTime(.001,now+d+.25);o.start(now+d);o.stop(now+d+.3)}); } catch{}
        renderEscalations();
        if (Notification.permission === 'granted') new Notification('ESCALATION: '+esc.name, { body: esc.from+' → '+esc.to+' ('+esc.score+')', tag: 'esc-'+esc.name });
        else if (Notification.permission !== 'denied') Notification.requestPermission();
    }

    function renderEscalations() {
        if (!escalationHistory.length) { notifList.innerHTML='<div class="notif-empty">No escalations yet</div>'; return; }
        notifList.innerHTML = escalationHistory.map(e => {
            const t = new Date(e.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
            return '<div class="notif-item"><div class="notif-item-header"><span class="notif-item-name">'+e.name+'</span><span class="notif-item-time">'+t+'</span></div><div class="notif-item-escalation"><span class="notif-status '+e.from+'">'+e.from+'</span><span class="notif-arrow">→</span><span class="notif-status '+e.to+'">'+e.to+'</span><span style="margin-left:auto;font-size:9px;color:var(--text-muted)">'+e.score+'</span></div></div>';
        }).join('');
    }

    // ═══════════════════════════════════════════════════
    // STARTUP — load map first, then data
    // ═══════════════════════════════════════════════════

    drawMap().then(() => {
        fetchActivities();
        fetchNews();
        connectWebSocket();
        setInterval(fetchActivities, 10 * 60 * 1000);
        setInterval(fetchNews, 5 * 60 * 1000);
    }).catch(err => {
        console.error('[map] Failed to load:', err);
        document.getElementById('mapLoading').textContent = 'Map failed to load. Check network.';
        // Still start data fetching
        fetchActivities();
        fetchNews();
        connectWebSocket();
    });

    document.addEventListener('click', () => { if (Notification.permission === 'default') Notification.requestPermission(); }, { once: true });
    </script>
</body>
</html>
